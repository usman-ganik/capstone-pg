services:
  - type: web
    name: tender-fee-configurator
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
